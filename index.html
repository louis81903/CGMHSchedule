            border: 2px solid #0056b3; 
            background: #fff;

            border-radius: 25px; 
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;

            padding: 15px;

            font-size: 16px; 
            background-color: white;

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; font-size: 15px; }
        th { background: #0056b3; color: white; white-space: nowrap;}
        tr:nth-child(even) { background-color: #f8f9fa; }
        
        .doctors-cell { text-align: left; font-weight: bold; color: #2c3e50; line-height: 1.6; }
        .doctor-note { color: #d9534f; font-size: 0.85em; font-weight: normal; }

    window.switchDept = function(dept) {
        currentDept = dept;
        document.querySelectorAll('.dept-btn').forEach(btn => {
            if (btn.id === 'btn-' + dept) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        updateDoctorOptions();
        renderTable();
    };

    function updateDoctorOptions() {
        const select = document.getElementById('doctorFilter');
        select.value = 'all'; 
        select.innerHTML = '<option value="all">所有醫師</option>';
        const docs = [...new Set(scheduleData.filter(i => i.dept === currentDept).map(i => i.doctor))].sort();
        docs.forEach(doc => { 
            if(!doc.includes('教學') && !doc.includes('醫師輪看診')) {
                select.innerHTML += `<option value="${doc}">${doc}</option>`; 
            }
        });
    }

    function renderTable() {
        const bVal = document.getElementById('branchFilter').value;
        const dVal = document.getElementById('dayFilter').value;
        const docVal = document.getElementById('doctorFilter').value;
        
        const filteredData = scheduleData.filter(item => {
            return item.dept === currentDept && 
                   (bVal === 'all' || item.branch === bVal) && 
                   (dVal === 'all' || item.day === dVal) && 
                   (docVal === 'all' || item.doctor === docVal);
        });

        const groupedMap = {};
        filteredData.forEach(item => {
            const key = `${item.day}|${item.branch}|${item.time}`;
            if (!groupedMap[key]) {
                groupedMap[key] = { day: item.day, branch: item.branch, time: item.time, doctors: [] };
            }
            let docName = item.doctor;
            if (item.note) {
                docName += `<span class="doctor-note">(${item.note})</span>`;
            }
            groupedMap[key].doctors.push(docName);
        });

        const groupedArray = Object.values(groupedMap);
        const dayOrder = { "星期一": 1, "星期二": 2, "星期三": 3, "星期四": 4, "星期五": 5, "星期六": 6 };
        const branchOrder = { "基隆長庚": 1, "台北長庚": 2, "林口長庚": 3, "桃園長庚": 4, "土城醫院": 5 };
        const timeOrder = { "上午": 1, "下午": 2, "夜診": 3 };
        
        groupedArray.sort((a, b) => {
            if (dayOrder[a.day] !== dayOrder[b.day]) return dayOrder[a.day] - dayOrder[b.day];
            if (branchOrder[a.branch] !== branchOrder[b.branch]) return branchOrder[a.branch] - branchOrder[b.branch];
            return timeOrder[a.time] - timeOrder[b.time];
        });

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        if (groupedArray.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="no-data">查無符合條件的門診資料</td></tr>';
            return;
        }

        groupedArray.forEach(item => {
            tbody.innerHTML += `<tr>
                <td>${item.day}</td>
                <td>${item.branch}</td>
                <td>${item.time}</td>
                <td class="doctors-cell">${item.doctors.join('、')}</td>
            </tr>`;
        });
    }

    // ★★★ 終極解決方案：強制立即呼叫一次（無視 window.onload） ★★★
    // 確保即使在外掛預覽網站中，也能在載入瞬間畫出表格！
    try {
        updateDoctorOptions();
        renderTable();
        
        // 保險起見，替所有 select 綁定監聽器，確保 iOS Safari 絕對有反應
        document.getElementById('branchFilter').addEventListener('change', renderTable);
        document.getElementById('dayFilter').addEventListener('change', renderTable);
        document.getElementById('doctorFilter').addEventListener('change', renderTable);
    } catch (e) {
        console.error("Initialization error:", e);
    }
